name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Inject main into package.json
        shell: pwsh
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.main='electron-main.js';fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('OK');"

      - name: Create electron-main.js
        shell: pwsh
        run: |
          $content = "const { app, BrowserWindow } = require('electron')`nconst path = require('path')`n`nfunction createWindow() {`n  const win = new BrowserWindow({`n    width: 1280,`n    height: 800,`n    minWidth: 800,`n    minHeight: 600,`n    icon: path.join(__dirname, 'public', 'icon.ico'),`n    webPreferences: { nodeIntegration: false, contextIsolation: true },`n    autoHideMenuBar: true,`n    title: 'GG Pasoryan Enterprise POS'`n  })`n  win.loadURL('https://pos2026-mu.vercel.app')`n  win.setMenuBarVisibility(false)`n}`n`napp.whenReady().then(() => {`n  createWindow()`n  app.on('activate', () => {`n    if (BrowserWindow.getAllWindows().length === 0) createWindow()`n  })`n})`n`napp.on('window-all-closed', () => {`n  if (process.platform !== 'darwin') app.quit()`n})"
          Set-Content -Path "electron-main.js" -Value $content -Encoding UTF8
          Write-Host "electron-main.js created"

      - name: Install Electron
        run: npm install --save-dev electron electron-builder

      - name: Build portable EXE
        run: npx electron-builder --win portable --config electron-builder.json

      - name: List release folder
        shell: pwsh
        run: Get-ChildItem -Path "release" -Recurse

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: GG POS Windows - Latest Build
          body: |
            GG Pasoryan Enterprise POS - Windows Portable

            Cara pakai: download EXE di bawah, double-click, langsung jalan.
            Password login: 008
            Demo web: https://pos2026-mu.vercel.app
          draft: false
          prerelease: false
          make_latest: true
          files: release/GG-Pasoryan-POS-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
