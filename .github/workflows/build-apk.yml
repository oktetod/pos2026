name: Build Android APK (TWA)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Restore keystore
        run: |
          echo "" | base64 -d > $GITHUB_WORKSPACE/android-keystore.jks
          ls -la android-keystore.jks

      - name: Generate TWA Android Project
        run: |
          mkdir -p twa-app/app/src/main/java/com/ggpasoryan/pos
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/app/src/main/res/mipmap-mdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxxhdpi

          # settings.gradle
          cat > twa-app/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GGPos"
          include ':app'
          EOF

          # root build.gradle
          cat > twa-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          EOF

          # gradle wrapper properties
          mkdir -p twa-app/gradle/wrapper
          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Download gradle wrapper jar
          cd twa-app
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          
          # gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
          EOF
          chmod +x gradlew
          cd ..

          # app/build.gradle
          cat > twa-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.ggpasoryan.pos'
              compileSdk 34
              defaultConfig {
                  applicationId "com.ggpasoryan.pos"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../../android-keystore.jks")
                      storePassword "ggpasoryan2026"
                      keyAlias "ggpos"
                      keyPassword "ggpasoryan2026"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <meta-data
                      android:name="asset_statements"
                      android:resource="@string/asset_statements" />
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:label="@string/app_name">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://pos2026-mu.vercel.app" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@drawable/splash" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                          android:value="300" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                          android:value="com.ggpasoryan.pos.fileprovider" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="pos2026-mu.vercel.app" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # strings.xml
          cat > twa-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">GG Pasoryan POS</string>
              <string name="asset_statements">
                  [{
                    \"relation\": [\"delegate_permission/common.handle_all_urls\"],
                    \"target\": {
                      \"namespace\": \"android_app\",
                      \"package_name\": \"com.ggpasoryan.pos\",
                      \"sha256_cert_fingerprints\": [\"9E:A4:EF:D5:68:5E:03:15:3C:45:7A:49:3F:A5:E5:8B:61:63:3E:3F:3B:53:A0:4E:33:07:32:2F:C8:6B:C8:96\"]
                    }
                  }]
              </string>
          </resources>
          EOF

          # colors.xml
          cat > twa-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1976D2</color>
          </resources>
          EOF

          # styles.xml
          cat > twa-app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # Simple splash drawable
          mkdir -p twa-app/app/src/main/res/drawable
          cat > twa-app/app/src/main/res/drawable/splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/colorPrimary" />
          </layer-list>
          EOF

          # Simple launcher icon (blue square PNG via Python)
          python3 -c "
          import struct, zlib, base64

          def create_png(size, color):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              row = b'\\x00' + bytes(color) * size
              raw = row * size
              idat = zlib.compress(raw)
              return b'\\x89PNG\\r\\n\\x1a\\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

          blue = [25, 118, 210]
          sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for name, sz in sizes.items():
              with open(f'twa-app/app/src/main/res/mipmap-{name}/ic_launcher.png','wb') as f:
                  f.write(create_png(sz, blue))
          print('Icons created')
          "

          echo "Project structure created:"
          find twa-app -type f | head -40

      - name: Build Release APK
        run: |
          cd twa-app
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find & rename APK
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" | sort
          APK=$(find . -name "*release*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" | head -1)
          fi
          echo "Using APK: $APK"
          cp "$APK" GG-Pasoryan-POS-Android.apk
          ls -lh GG-Pasoryan-POS-Android.apk

      - name: Auto-create assetlinks.json & push to repo
        run: |
          mkdir -p public/.well-known
          cat > public/.well-known/assetlinks.json << 'ASSETEOF'
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.ggpasoryan.pos",
              "sha256_cert_fingerprints": [
                "9E:A4:EF:D5:68:5E:03:15:3C:45:7A:49:3F:A5:E5:8B:61:63:3E:3F:3B:53:A0:4E:33:07:32:2F:C8:6B:C8:96"
              ]
            }
          }]
          ASSETEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/.well-known/assetlinks.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: auto-update assetlinks.json [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: GG POS Android - Latest Build
          body: |
            ## GG Pasoryan Enterprise POS — Android APK (TWA)

            **Cara install:**
            1. Download APK di bawah
            2. Settings → Security → aktifkan "Install unknown apps"
            3. Buka file APK → Install

            **Login:** Password default `008`
            **App:** https://pos2026-mu.vercel.app
          draft: false
          prerelease: false
          make_latest: true
          files: GG-Pasoryan-POS-Android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
