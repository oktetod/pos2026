name: Build Android APK (TWA)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Restore keystore
        run: |
          echo "" | base64 -d > android-keystore.jks
          echo "Keystore OK"

      - name: Auto-create assetlinks.json & push to repo
        run: |
          mkdir -p public/.well-known
          cat > public/.well-known/assetlinks.json << 'ASSETEOF'
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.ggpasoryan.pos",
              "sha256_cert_fingerprints": [
                "9E:A4:EF:D5:68:5E:03:15:3C:45:7A:49:3F:A5:E5:8B:61:63:3E:3F:3B:53:A0:4E:33:07:32:2F:C8:6B:C8:96"
              ]
            }
          }]
          ASSETEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/.well-known/assetlinks.json
          git diff --staged --quiet && echo "assetlinks unchanged" || \
            (git commit -m "chore: auto-update assetlinks.json [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build TWA APK
        run: printf 'ggpasoryan2026\nggpasoryan2026\n' | bubblewrap build --skipPwaValidation

      - name: Find & rename APK
        run: |
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" -not -path "*debug*" | head -1)
          echo "Found APK: $APK"
          cp "$APK" GG-Pasoryan-POS-Android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: GG POS Android - Latest Build
          body: |
            ## GG Pasoryan Enterprise POS — Android APK (TWA)

            **Cara install:**
            1. Download APK di bawah
            2. Settings → Security → aktifkan "Install unknown apps"
            3. Buka file APK → Install

            **Login:** Password default `008`
            **App:** https://pos2026-mu.vercel.app
          draft: false
          prerelease: false
          make_latest: true
          files: GG-Pasoryan-POS-Android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
